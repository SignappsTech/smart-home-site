name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages.
# Requires: repo Settings → Pages → "Build and deployment" → Source: "GitHub Actions".

on:
  push:
    branches: [prod] # deploys the current state of the prod branch
  workflow_dispatch: # allow manual runs from the Actions tab

# Least-privilege permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Static export → ./out, served from the root of the custom domain
      # signapps.si (no basePath). public/CNAME is copied into the artifact so
      # GitHub Pages keeps the custom domain across deploys. The post-build
      # script strips dev-only routes.
      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
